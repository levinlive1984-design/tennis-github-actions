name: Schedule Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "UTC time:"
          date -u
          echo "Taiwan time:"
          TZ=Asia/Taipei date
