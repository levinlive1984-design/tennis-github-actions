name: Update Tennis Matches Page

on:
  workflow_dispatch:
  schedule:
    # 測試邏輯：
    # 每小時的 02 / 07 / 12 / 17 / 22 / 27 / 32 / 37 / 42 / 47 / 52 / 57 分觸發
    # 等於每 5 分鐘嘗試一次，但以 04:07 作為每日重置點
    #
    # 台灣 04:07 後：
    # 若 today_matches.json 的 generated_at_taiwan 早於今日 04:07 → 執行更新
    # 若 generated_at_taiwan 晚於或等於今日 04:07 → 直接跳過
    #
    # 隔天 04:07 後會重新開始新一輪
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check daily 04:07 gate
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import urllib.request
          from datetime import datetime, time, timedelta
          from zoneinfo import ZoneInfo

          def out(key, value):
              value = str(value).replace("\n", " ")[:500]
              print(f"{key}={value}")

          event_name = os.environ.get("EVENT_NAME", "")

          # 手動執行永遠放行，方便你人工測試
          if event_name == "workflow_dispatch":
              out("should_run", "true")
              out("reason", "Manual run: bypass gate.")
              raise SystemExit

          tz = ZoneInfo("Asia/Taipei")
          now_tw = datetime.now(tz)

          # 每日重置時間：台灣 04:07
          reset_t = time(4, 7)

          if now_tw.time() >= reset_t:
              cycle_start = datetime.combine(now_tw.date(), reset_t, tzinfo=tz)
          else:
              cycle_start = datetime.combine(
                  now_tw.date() - timedelta(days=1),
                  reset_t,
                  tzinfo=tz
              )

          url = (
              "https://levinlive1984-design.github.io/"
              "tennis-github-actions/today_matches.json"
              f"?v={os.environ.get('RUN_ID')}-{os.environ.get('RUN_ATTEMPT')}"
          )

          try:
              with urllib.request.urlopen(url, timeout=20) as r:
                  data = json.loads(r.read().decode("utf-8"))

              generated_tw = str(data.get("generated_at_taiwan", "")).strip()

          except Exception as e:
              out("should_run", "true")
              out("reason", f"Cannot read existing JSON, run update: {e}")
              raise SystemExit

          try:
              # 支援：
              # 2026-07-01 02:08:00
              # 2026/07/01 02:08:00
              # 2026-07-01T02:08:00
              generated_dt = datetime.fromisoformat(
                  generated_tw.replace("/", "-")
              )

              if generated_dt.tzinfo is None:
                  generated_dt = generated_dt.replace(tzinfo=tz)
              else:
                  generated_dt = generated_dt.astimezone(tz)

          except Exception as e:
              out("should_run", "true")
              out("reason", f"Cannot parse generated_at_taiwan={generated_tw}, run update: {e}")
              raise SystemExit

          if generated_dt >= cycle_start:
              out("should_run", "false")
              out(
                  "reason",
                  f"Already updated this cycle. generated_at_taiwan={generated_tw}, cycle_start={cycle_start.isoformat()}"
              )
          else:
              out("should_run", "true")
              out(
                  "reason",
                  f"Need update. generated_at_taiwan={generated_tw}, cycle_start={cycle_start.isoformat()}, now_taiwan={now_tw.isoformat()}"
              )
          PY

      - name: Stop because this cycle is already updated
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "${{ steps.gate.outputs.reason }}"

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Generate tennis matches site
        if: steps.gate.outputs.should_run == 'true'
        run: python tennis_filter.py

      - name: Setup Pages
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: steps.gate.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
